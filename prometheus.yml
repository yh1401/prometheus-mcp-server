# Prometheus Configuration for MCP Server

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter targets
  - job_name: 'node-exporter'
    static_configs:
      - targets:
        - 'node-exporter:9100'