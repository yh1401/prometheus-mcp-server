# Docker Compose for Prometheus MCP Server Extended

version: '3.8'

services:
  prometheus-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prometheus-mcp-server
    ports:
      - "8000:8000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - NODE_EXPORTER_PORT=9100
      - API_PORT=8000
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  prometheus-mcp-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prometheus-mcp-mcp
    ports:
      - "8001:8001"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - NODE_EXPORTER_PORT=9100
      - MCP_PORT=8001
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring
    command: python mcp_entrypoint.py

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:

networks:
  monitoring:
    driver: bridge